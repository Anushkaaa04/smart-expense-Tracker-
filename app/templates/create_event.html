{% extends "layout.html" %}
{% block content %}
<div class="max-w-lg mx-auto mt-6 anim-1">
    <div class="flex items-center gap-4 mb-8">
        <a href="{{ url_for('main.list_events') }}" class="w-10 h-10 rounded-xl flex items-center justify-center transition hover:scale-110"
           style="background:var(--card); border:1px solid var(--border);">←</a>
        <div>
            <h1 class="text-2xl font-black" style="color:var(--text)">Plan a Trip ✈️</h1>
            <p class="text-xs text-faint">Set up a budget for your next adventure</p>
        </div>
    </div>

    <div class="card p-8">
        <form method="POST" class="flex flex-col gap-6" id="tripForm">

            <!-- Trip Name -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-faint">Trip / Event Name</label>
                <input type="text" name="name" placeholder="e.g. Goa Trip, College Fest" class="input" autofocus required>
            </div>

            <!-- Trip Type -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-3 text-faint">Trip Type</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="trip_type" value="solo" class="hidden peer" checked onchange="toggleTripType()">
                        <div class="peer-checked:ring-2 peer-checked:ring-indigo-400 peer-checked:ring-offset-1 rounded-2xl p-4 text-center transition hover:scale-[1.02]"
                             style="background:var(--card2); border:1px solid var(--border);">
                            <div class="text-3xl mb-2">🧍</div>
                            <p class="font-black text-sm" style="color:var(--text)">Solo Trip</p>
                            <p class="text-xs text-faint">Just you</p>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="trip_type" value="group" class="hidden peer" onchange="toggleTripType()">
                        <div class="peer-checked:ring-2 peer-checked:ring-purple-400 peer-checked:ring-offset-1 rounded-2xl p-4 text-center transition hover:scale-[1.02]"
                             style="background:var(--card2); border:1px solid var(--border);">
                            <div class="text-3xl mb-2">👥</div>
                            <p class="font-black text-sm" style="color:var(--text)">Group Picnic</p>
                            <p class="text-xs text-faint">Everyone contributes</p>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Solo: direct budget -->
            <div id="soloFields">
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-faint">Total Budget (₹)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-black text-lg" style="color:var(--accent)">₹</span>
                    <input type="number" name="total_budget" step="0.01" placeholder="0.00"
                           class="input pl-9 text-xl font-black" id="soloBudgetInput" oninput="updateFundingPreview()">
                </div>
            </div>

            <!-- Group: members + contribution -->
            <div id="groupFields" class="hidden flex flex-col gap-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-faint">Members</label>
                        <input type="number" name="member_count" min="2" placeholder="4"
                               class="input text-xl font-black text-center" id="memberCount"
                               oninput="calcGroupBudget()">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-faint">Each Contributes (₹)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 font-black" style="color:var(--accent)">₹</span>
                            <input type="number" name="contribution_per_member" step="0.01" placeholder="500"
                                   class="input pl-8 text-xl font-black" id="contribution"
                                   oninput="calcGroupBudget()">
                        </div>
                    </div>
                </div>
                <!-- Calculated total -->
                <div id="groupTotal" class="hidden rounded-2xl p-4"
                     style="background:rgba(99,102,241,0.08); border:1px solid rgba(99,102,241,0.2);">
                    <div class="flex items-center justify-between mb-3">
                        <div class="text-center flex-1">
                            <p class="text-xs text-faint mb-1">You Pay</p>
                            <p class="text-2xl font-black" style="color:var(--accent)" id="userPaysAmt">₹0</p>
                        </div>
                        <div class="text-faint text-xl">→</div>
                        <div class="text-center flex-1">
                            <p class="text-xs text-faint mb-1">Full Group Total</p>
                            <p class="text-lg font-black" style="color:var(--text2)" id="groupTotalAmt">₹0</p>
                        </div>
                    </div>
                    <p class="text-xs text-center text-faint" id="groupTotalDesc"></p>
                </div>
            </div>

            <!-- Funding Source -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-3 text-faint">Fund from</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="funding_source" value="monthly" class="hidden peer" checked onchange="updateFundingPreview()">
                        <div class="peer-checked:ring-2 peer-checked:ring-indigo-400 peer-checked:ring-offset-1 rounded-2xl p-4 transition hover:scale-[1.02]"
                             style="background:var(--card2); border:1px solid var(--border);">
                            <div class="text-2xl mb-1">💰</div>
                            <p class="font-black text-sm" style="color:var(--text)">Monthly Budget</p>
                            <p class="text-xs text-faint">Money left:</p>
                            <p class="text-sm font-black" style="color:var(--accent)">₹{{ "%.0f"|format(money_left) }}</p>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="funding_source" value="savings" class="hidden peer" onchange="updateFundingPreview()">
                        <div class="peer-checked:ring-2 peer-checked:ring-pink-400 peer-checked:ring-offset-1 rounded-2xl p-4 transition hover:scale-[1.02]"
                             style="background:var(--card2); border:1px solid var(--border);">
                            <div class="text-2xl mb-1">🐷</div>
                            <p class="font-black text-sm" style="color:var(--text)">Piggy Bank</p>
                            <p class="text-xs text-faint">Available:</p>
                            <p class="text-sm font-black" style="color:var(--green)">₹{{ "%.0f"|format(total_savings) }}</p>
                        </div>
                    </label>
                </div>
                <div id="fundingPreview" class="mt-3 p-3 rounded-xl text-sm font-semibold hidden"
                     style="border:1px solid var(--border); color:var(--text2);"></div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-faint">Notes <span class="normal-case font-normal">(optional)</span></label>
                <textarea name="description" rows="2" placeholder="Itinerary, packing list, goals..."
                          class="input" style="resize:none;"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-full justify-center py-3 text-base">
                Launch Trip 🚀
            </button>
        </form>
    </div>
</div>

<script>
const moneyLeft    = {{ money_left }};
const totalSavings = {{ total_savings }};

function toggleTripType() {
    const isGroup = document.querySelector('input[name="trip_type"]:checked').value === 'group';
    document.getElementById('soloFields').classList.toggle('hidden', isGroup);
    document.getElementById('groupFields').classList.toggle('hidden', !isGroup);
    updateFundingPreview();
}

function calcGroupBudget() {
    const m = parseInt(document.getElementById('memberCount').value) || 0;
    const c = parseFloat(document.getElementById('contribution').value) || 0;
    const el = document.getElementById('groupTotal');
    if (m > 0 && c > 0) {
        el.classList.remove('hidden');
        document.getElementById('userPaysAmt').textContent = '₹' + c.toLocaleString('en-IN');
        document.getElementById('groupTotalAmt').textContent = '₹' + (m * c).toLocaleString('en-IN');
        document.getElementById('groupTotalDesc').textContent = `${m} members × ₹${c.toLocaleString('en-IN')} = ₹${(m*c).toLocaleString('en-IN')} total`;
    } else {
        el.classList.add('hidden');
    }
    updateFundingPreview();
}

function getAmount() {
    const isGroup = document.querySelector('input[name="trip_type"]:checked')?.value === 'group';
    if (isGroup) {
        // User only pays their own contribution
        return parseFloat(document.getElementById('contribution').value) || 0;
    }
    return parseFloat(document.getElementById('soloBudgetInput').value) || 0;
}

function updateFundingPreview() {
    const amount  = getAmount();
    const preview = document.getElementById('fundingPreview');
    const source  = document.querySelector('input[name="funding_source"]:checked')?.value || 'monthly';
    if (amount <= 0) { preview.classList.add('hidden'); return; }
    preview.classList.remove('hidden');
    if (source === 'savings') {
        const after = totalSavings - amount;
        preview.innerHTML = after >= 0
            ? `🐷 Your share ₹${amount.toLocaleString('en-IN')} from Piggy Bank. Remaining: ₹${after.toLocaleString('en-IN')}`
            : `⚠️ Not enough! Need ₹${amount.toLocaleString('en-IN')}, have ₹${totalSavings.toLocaleString('en-IN')}`;
        preview.style.color = after >= 0 ? 'var(--green)' : 'var(--red)';
        preview.style.background = after >= 0 ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.08)';
        preview.style.borderColor = after >= 0 ? 'rgba(16,185,129,0.2)' : 'rgba(239,68,68,0.2)';
    } else {
        const after = moneyLeft - amount;
        preview.innerHTML = after >= 0
            ? `💰 Your share ₹${amount.toLocaleString('en-IN')} from monthly budget. Remaining: ₹${after.toLocaleString('en-IN')}`
            : `⚠️ Not enough! Need ₹${amount.toLocaleString('en-IN')}, have ₹${moneyLeft.toLocaleString('en-IN')}`;
        preview.style.color = after >= 0 ? 'var(--accent)' : 'var(--red)';
        preview.style.background = after >= 0 ? 'rgba(99,102,241,0.08)' : 'rgba(239,68,68,0.08)';
        preview.style.borderColor = after >= 0 ? 'rgba(99,102,241,0.2)' : 'rgba(239,68,68,0.2)';
    }
}
document.querySelectorAll('input[name="funding_source"]').forEach(r => r.addEventListener('change', updateFundingPreview));
</script>
{% endblock %}
