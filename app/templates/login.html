{% extends "layout.html" %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
<div class="w-full max-w-md anim-1">

    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg"
             style="background:linear-gradient(135deg,var(--accent),var(--accent2));">📈</div>
        <h1 class="text-3xl font-black" style="color:var(--text)">Welcome back</h1>
        <p class="text-sm text-faint mt-1">Sign in to your SmartExpense account</p>
    </div>

    <div class="card p-8">
        <form method="POST" class="flex flex-col gap-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-faint">Email</label>
                <input type="email" name="email" placeholder="you@example.com" class="input" required autofocus>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-faint">Password</label>
                <input type="password" name="password" placeholder="••••••••" class="input" required>
            </div>
            <button type="submit" class="btn btn-primary w-full justify-center py-3 text-base mt-1">
                Sign In →
            </button>
        </form>
    </div>

    <p class="text-center text-sm text-faint mt-6">
        No account yet?
        <a href="{{ url_for('main.register') }}" class="font-bold text-accent hover:underline">Create one free</a>
    </p>
</div>
</div>
{% endblock %}
